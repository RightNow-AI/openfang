# NOTE: The GHCR image (ghcr.io/rightnow-ai/openfang) is not yet public.
# For now, build from source using `docker compose up --build`.
# See: https://github.com/RightNow-AI/openfang/issues/12

version: "3.8"
services:
  openfang:
    build: .
    # image: ghcr.io/rightnow-ai/openfang:latest  # Uncomment when GHCR is public
    ports:
      - "4200:4200"
    volumes:
      - openfang-data:/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
    restart: unless-stopped
    # Liveness probe: restart the container if the HTTP server stops responding.
    # Readiness probe: wait for /api/ready to return 200 before routing traffic.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4200/api/ready"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    # Resource limits — adjust to your host capacity.
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 512M

volumes:
  openfang-data:
