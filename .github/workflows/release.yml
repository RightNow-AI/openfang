name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  preflight:
    name: Release Preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-preflight
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            prometheus \
            patchelf
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Install trufflehog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
      - name: Run workspace quality gates
        run: |
          cargo build --workspace --lib --locked
          cargo test --workspace --locked
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo audit --locked
          trufflehog filesystem . \
            --no-update \
            --fail \
            --only-verified \
            --exclude-paths=<(echo -e "target/\n.git/\nCargo.lock")
          bash -n scripts/backup-openfang.sh
          bash -n scripts/preflight-openfang.sh
          bash -n scripts/provider-canary-openfang.sh
          bash -n scripts/restore-openfang.sh
          bash -n scripts/smoke-openfang.sh
          bash -n scripts/live-api-smoke-openfang.sh
          python3 -m py_compile scripts/healthcheck-openfang.py
          OPENFANG_API_KEY=release-preflight-placeholder docker compose config
          systemd-analyze verify deploy/openfang.service
          systemd-analyze verify deploy/openfang-backup.service
          systemd-analyze verify deploy/openfang-backup.timer
          promtool check rules deploy/openfang-alerts.yml
          promtool check config deploy/prometheus-scrape.yml

  # ── Tauri Desktop App (Windows + macOS + Linux) ───────────────────────────
  # Produces: .msi, .exe (Windows) | .dmg, .app (macOS) | .AppImage, .deb (Linux)
  # Also generates and uploads latest.json (the auto-updater manifest)
  desktop:
    name: Desktop / ${{ matrix.platform.name }}
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux x86_64
            os: ubuntu-22.04
            args: "--target x86_64-unknown-linux-gnu"
            rust_target: x86_64-unknown-linux-gnu

          - name: macOS x86_64
            os: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_target: x86_64-apple-darwin

          - name: macOS ARM64
            os: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_target: aarch64-apple-darwin

          - name: Windows x86_64
            os: windows-latest
            args: "--target x86_64-pc-windows-msvc"
            rust_target: x86_64-pc-windows-msvc

          - name: Windows ARM64
            os: windows-latest
            args: "--target aarch64-pc-windows-msvc"
            rust_target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Verify desktop version matches release tag
        shell: bash
        run: |
          PYTHON_BIN="python3"
          if ! command -v "$PYTHON_BIN" >/dev/null 2>&1; then
            PYTHON_BIN="python"
          fi
          if ! command -v "$PYTHON_BIN" >/dev/null 2>&1; then
            echo "Neither python3 nor python is available on this runner"
            exit 1
          fi
          DESKTOP_VERSION=$("$PYTHON_BIN" - <<'PY'
          import json
          with open("crates/openfang-desktop/tauri.conf.json", "r", encoding="utf-8") as f:
              print(json.load(f)["version"])
          PY
          )
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$DESKTOP_VERSION" != "$TAG_VERSION" ]; then
            echo "Desktop version $DESKTOP_VERSION does not match tag $TAG_VERSION"
            exit 1
          fi

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.platform.rust_target }}

      - name: Import macOS signing certificate
        if: runner.os == 'macOS'
        env:
          MAC_CERT_BASE64: ${{ secrets.MAC_CERT_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          if [ -z "${MAC_CERT_BASE64:-}" ] || [ -z "${MAC_CERT_PASSWORD:-}" ]; then
            echo "macOS signing secrets not configured; continuing with unsigned macOS build"
            exit 0
          fi
          echo "$MAC_CERT_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import $RUNNER_TEMP/certificate.p12 -P "$MAC_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          echo "Using signing identity: $IDENTITY"
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          rm -f $RUNNER_TEMP/certificate.p12

      - name: Build and bundle Tauri desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.MAC_NOTARIZE_APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.MAC_NOTARIZE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.MAC_NOTARIZE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "OpenFang ${{ github.ref_name }}"
          releaseBody: |
            ## What's New

            See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for full details.

            ## Installation

            **Desktop App** — Download the installer for your platform below.

            **CLI (Linux/macOS)**:
            ```bash
            curl -sSf https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/scripts/install.sh | sh
            ```

            **CLI (Windows PowerShell)**:
            ```powershell
            irm https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/scripts/install.ps1 | iex
            ```

            **Docker**:
            ```bash
            git clone --branch ${{ github.ref_name }} --depth 1 https://github.com/${{ github.repository }}.git
            cd openfang-upstream-fork
            OPENFANG_LISTEN=0.0.0.0:4200 OPENFANG_API_KEY=$(openssl rand -hex 32) docker compose up --build
            ```

            **Coming from OpenClaw?**
            ```bash
            openfang migrate --from openclaw
            ```
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          projectPath: crates/openfang-desktop
          args: ${{ matrix.platform.args }}

  verify-desktop-release-assets:
    name: Verify Desktop Release Assets
    runs-on: ubuntu-latest
    needs: desktop
    steps:
      - name: Confirm updater manifest is present and valid
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          tag = os.environ["GITHUB_REF"].removeprefix("refs/tags/")
          req = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/releases/tags/{tag}",
              headers={
                  "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                  "Accept": "application/vnd.github+json",
              },
          )
          with urllib.request.urlopen(req) as resp:
              release = json.load(resp)

          assets = release.get("assets", [])
          names = [asset.get("name", "") for asset in assets]
          latest_manifest = next((a for a in assets if a.get("name") == "latest.json"), None)
          if latest_manifest is None:
              print("Release assets:", names)
              print("Missing required updater artifact: latest.json")
              sys.exit(1)

          manifest_url = latest_manifest.get("browser_download_url")
          if not manifest_url:
              print("latest.json asset is missing browser_download_url")
              sys.exit(1)

          with urllib.request.urlopen(manifest_url) as resp:
              manifest = json.load(resp)

          if not isinstance(manifest, dict):
              print("latest.json is not a JSON object")
              sys.exit(1)

          platforms = manifest.get("platforms")
          if not isinstance(platforms, dict) or not platforms:
              print("latest.json missing non-empty 'platforms' object")
              sys.exit(1)

          invalid = []
          for platform, meta in platforms.items():
              if not isinstance(meta, dict):
                  invalid.append(platform)
                  continue
              if not isinstance(meta.get("url"), str) or not meta["url"].strip():
                  invalid.append(platform)
                  continue
              if not isinstance(meta.get("signature"), str) or not meta["signature"].strip():
                  invalid.append(platform)

          if invalid:
              print("latest.json has invalid platform entries:", ", ".join(invalid))
              sys.exit(1)

          manifest_version = manifest.get("version")
          expected_version = tag.removeprefix("v")
          if not isinstance(manifest_version, str) or manifest_version != expected_version:
              print(
                  f"latest.json version mismatch: expected {expected_version}, "
                  f"got {manifest_version!r}"
              )
              sys.exit(1)
          PY

  # ── CLI Binary (5 platforms) ──────────────────────────────────────────────
  cli:
    name: CLI / ${{ matrix.target }}
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - name: Install cross (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --locked
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}
      - name: Build CLI (cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }} --bin openfang
      - name: Build CLI
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }} --bin openfang
      - name: Ad-hoc codesign CLI binary (macOS)
        if: runner.os == 'macOS'
        run: |
          xattr -cr target/${{ matrix.target }}/release/openfang || true
          codesign --force --sign - target/${{ matrix.target }}/release/openfang
      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../openfang-${{ matrix.target }}.tar.gz openfang
          cd ../../..
          sha256sum openfang-${{ matrix.target }}.tar.gz > openfang-${{ matrix.target }}.tar.gz.sha256
      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/openfang.exe" -DestinationPath "openfang-${{ matrix.target }}.zip"
          $hash = (Get-FileHash "openfang-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  openfang-${{ matrix.target }}.zip" | Out-File -Encoding ASCII "openfang-${{ matrix.target }}.zip.sha256"
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: openfang-${{ matrix.target }}.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Docker (linux/amd64 + linux/arm64) ────────────────────────────────────
  docker:
    name: Docker Image
    needs: preflight
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.image.outputs.name }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - name: Compute image name
        id: image
        run: echo "name=$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  verify-docker-release-image:
    name: Verify Docker Release Image
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull, boot, and smoke test versioned image
        env:
          IMAGE_NAME: ${{ needs.docker.outputs.image_name }}
          IMAGE_VERSION: ${{ needs.docker.outputs.version }}
          OPENFANG_API_KEY: release-docker-smoke-key
          OPENFANG_BASE_URL: http://127.0.0.1:4210
          OPENFANG_STRICT_PRODUCTION: "1"
          OPENFANG_SMOKE_RESTART_CMD: docker restart openfang-release-smoke >/dev/null
          OPENFANG_SMOKE_RESTART_TIMEOUT_SECS: "90"
        run: |
          trap 'docker logs openfang-release-smoke >/dev/null 2>&1 || true; docker rm -f openfang-release-smoke >/dev/null 2>&1 || true' EXIT
          docker_home="$RUNNER_TEMP/docker-openfang-home"
          mkdir -p "$docker_home"
          chmod 0777 "$docker_home"
          cat > "$docker_home/config.toml" <<'EOF'
          api_listen = "0.0.0.0:4200"

          [default_model]
          provider = "ollama"
          model = "test-model"
          EOF
          chmod 0666 "$docker_home/config.toml"
          docker pull "${IMAGE_NAME}:${IMAGE_VERSION}"
          docker run --rm "${IMAGE_NAME}:${IMAGE_VERSION}" --version >/dev/null
          docker run -d --name openfang-release-smoke \
            -p 127.0.0.1:4210:4200 \
            -v "$docker_home:/data" \
            -e OPENFANG_LISTEN=0.0.0.0:4200 \
            -e OPENFANG_API_KEY="$OPENFANG_API_KEY" \
            -e OPENFANG_STRICT_PRODUCTION="$OPENFANG_STRICT_PRODUCTION" \
            "${IMAGE_NAME}:${IMAGE_VERSION}" start

          for _ in $(seq 1 30); do
            if curl -fsS "$OPENFANG_BASE_URL/api/health" >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          curl -fsS "$OPENFANG_BASE_URL/api/health" >/dev/null
          for _ in $(seq 1 30); do
            health_status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' openfang-release-smoke)"
            if [[ "$health_status" == "healthy" ]]; then
              break
            fi
            sleep 2
          done
          test "$health_status" = "healthy"
          bash scripts/smoke-openfang.sh "$OPENFANG_BASE_URL"
          OPENFANG_API_KEY="$OPENFANG_API_KEY" \
            OPENFANG_SMOKE_RESTART_CMD="$OPENFANG_SMOKE_RESTART_CMD" \
            OPENFANG_SMOKE_RESTART_TIMEOUT_SECS="$OPENFANG_SMOKE_RESTART_TIMEOUT_SECS" \
            bash scripts/live-api-smoke-openfang.sh "$OPENFANG_BASE_URL"

  provider-canary:
    name: Provider Canary
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-provider-canary
      - name: Require Groq provider secret
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -z "${GROQ_API_KEY:-}" ]; then
            echo "GROQ_API_KEY secret is required for the release provider canary"
            exit 1
          fi
      - name: Build release daemon
        run: cargo build --release -p openfang-cli
      - name: Boot daemon and run provider canary
        env:
          OPENFANG_HOME: ${{ runner.temp }}/openfang-home
          OPENFANG_LISTEN: 127.0.0.1:4200
          OPENFANG_API_KEY: release-provider-canary-key
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENFANG_CANARY_PROVIDER: groq
          OPENFANG_CANARY_MODEL: llama-3.3-70b-versatile
          OPENFANG_CANARY_API_KEY_ENV: GROQ_API_KEY
          OPENFANG_CANARY_MESSAGE: Say hello in five words.
        run: |
          mkdir -p "$OPENFANG_HOME"
          printf 'api_listen = "127.0.0.1:4200"\n' > "$OPENFANG_HOME/config.toml"
          trap 'if [[ -n "${daemon_pid:-}" ]]; then kill "${daemon_pid}" || true; wait "${daemon_pid}" || true; fi' EXIT
          target/release/openfang start >"$RUNNER_TEMP/openfang-provider-canary.log" 2>&1 &
          daemon_pid=$!

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4200/api/health >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:4200/api/health >/dev/null
          bash scripts/provider-canary-openfang.sh
          OPENFANG_API_KEY=release-provider-canary-key \
            OPENFANG_CANARY_PROVIDER="${OPENFANG_CANARY_PROVIDER}" \
            OPENFANG_CANARY_MODEL="${OPENFANG_CANARY_MODEL}" \
            OPENFANG_CANARY_API_KEY_ENV="${OPENFANG_CANARY_API_KEY_ENV}" \
            OPENFANG_CANARY_MESSAGE="${OPENFANG_CANARY_MESSAGE}" \
            bash scripts/live-api-smoke-openfang.sh http://127.0.0.1:4200
      - name: Upload provider canary log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: provider-canary-log
          path: ${{ runner.temp }}/openfang-provider-canary.log
          if-no-files-found: ignore

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - verify-desktop-release-assets
      - cli
      - docker
      - verify-docker-release-image
      - provider-canary
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Promote Docker image to latest
        run: |
          docker buildx imagetools create \
            --tag "${{ needs.docker.outputs.image_name }}:latest" \
            "${{ needs.docker.outputs.image_name }}:${{ needs.docker.outputs.version }}"
      - name: Publish GitHub release draft
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = context.ref.replace("refs/tags/", "");
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });
            if (!release.draft) {
              core.info(`Release ${tag} is already published`);
              return;
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false,
              prerelease: false,
            });
            core.info(`Published release ${tag}`);
