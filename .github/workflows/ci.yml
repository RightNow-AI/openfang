name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Rust library crates (all 3 platforms) ──────────────────────────────────
  build:
    name: Build / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: build-${{ matrix.os }}
      - name: Install Tauri system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - run: cargo build --workspace --lib

  test:
    name: Test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.os }}
      - name: Install Tauri system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      # Tests that need a display (Tauri) are skipped in headless CI via cfg
      - run: cargo test --workspace --locked

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - run: cargo audit --locked

  # ── Secrets scanning (prevent accidental credential commits) ──────────────
  secrets:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install trufflehog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
      - name: Scan for secrets
        run: |
          trufflehog filesystem . \
            --no-update \
            --fail \
            --only-verified \
            --exclude-paths=<(echo -e "target/\n.git/\nCargo.lock")

  # ── Installer smoke test (verify repo-owned install entrypoints) ───────────
  provider-canary:
    name: Provider Canary (optional)
    runs-on: ubuntu-latest
    if: ${{ secrets.OPENFANG_PROVIDER_CANARY_API_KEY != '' && secrets.OPENFANG_CANARY_BASE_URL != '' && secrets.OPENFANG_CANARY_PROVIDER != '' && secrets.OPENFANG_CANARY_MODEL != '' && secrets.OPENFANG_CANARY_API_KEY_ENV != '' }}
    steps:
      - uses: actions/checkout@v6
      - name: Run provider canary
        env:
          OPENFANG_BASE_URL: ${{ secrets.OPENFANG_CANARY_BASE_URL }}
          OPENFANG_API_KEY: ${{ secrets.OPENFANG_PROVIDER_CANARY_API_KEY }}
          OPENFANG_CANARY_PROVIDER: ${{ secrets.OPENFANG_CANARY_PROVIDER }}
          OPENFANG_CANARY_MODEL: ${{ secrets.OPENFANG_CANARY_MODEL }}
          OPENFANG_CANARY_API_KEY_ENV: ${{ secrets.OPENFANG_CANARY_API_KEY_ENV }}
        run: bash scripts/provider-canary-openfang.sh

  install-smoke:
    name: Install Script Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify installer defaults target this fork
        run: |
          grep -q 'OPENFANG_RELEASE_REPO:-tytsxai/openfang-upstream-fork' scripts/install.sh
          grep -q 'tytsxai/openfang-upstream-fork' scripts/install.ps1
      - name: Syntax-check shell installer
        run: |
          head -n 1 scripts/install.sh | grep -q '^#!'
          bash -n scripts/install.sh
      - name: Syntax-check PowerShell installer
        run: |
          pwsh -NoProfile -Command "[ScriptBlock]::Create((Get-Content scripts/install.ps1 -Raw)) | Out-Null"

  daemon-smoke:
    name: Daemon Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: daemon-smoke
      - name: Build release daemon
        run: cargo build --release -p openfang-cli --locked
      - name: Boot daemon and run smoke checks
        env:
          OPENFANG_HOME: ${{ runner.temp }}/openfang-home
          OPENFANG_LISTEN: 127.0.0.1:4200
          OPENFANG_API_KEY: ci-smoke-key-please-change
        run: |
          mkdir -p "$OPENFANG_HOME"
          cat > "$OPENFANG_HOME/config.toml" <<'EOF'
          api_listen = "127.0.0.1:4200"

          [default_model]
          provider = "ollama"
          model = "test-model"
          EOF
          trap 'if [[ -n "${daemon_pid:-}" ]]; then kill "${daemon_pid}" || true; wait "${daemon_pid}" || true; fi' EXIT
          target/release/openfang start >"$RUNNER_TEMP/openfang-daemon.log" 2>&1 &
          daemon_pid=$!

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4200/api/health >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:4200/api/health >/dev/null
          bash scripts/smoke-openfang.sh
          bash scripts/preflight-openfang.sh
          OPENFANG_API_KEY=ci-smoke-key-please-change bash scripts/live-api-smoke-openfang.sh http://127.0.0.1:4200
      - name: Upload daemon smoke log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: daemon-smoke-log
          path: ${{ runner.temp }}/openfang-daemon.log
          if-no-files-found: ignore

  docker-smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker image
        run: docker build -t openfang-ci-smoke .
      - name: Verify image starts and serves API
        env:
          OPENFANG_API_KEY: ci-docker-smoke-key
          OPENFANG_BASE_URL: http://127.0.0.1:4210
          OPENFANG_STRICT_PRODUCTION: "1"
          OPENFANG_SMOKE_RESTART_CMD: docker restart openfang-ci-smoke >/dev/null
          OPENFANG_SMOKE_RESTART_TIMEOUT_SECS: "90"
        run: |
          trap 'docker logs openfang-ci-smoke >/dev/null 2>&1 || true; docker rm -f openfang-ci-smoke >/dev/null 2>&1 || true' EXIT
          docker_home="$RUNNER_TEMP/docker-openfang-home"
          mkdir -p "$docker_home"
          chmod 0777 "$docker_home"
          cat > "$docker_home/config.toml" <<'EOF'
          api_listen = "0.0.0.0:4200"

          [default_model]
          provider = "ollama"
          model = "test-model"
          EOF
          chmod 0666 "$docker_home/config.toml"
          docker run --rm openfang-ci-smoke --version >/dev/null
          docker run -d --name openfang-ci-smoke \
            -p 127.0.0.1:4210:4310 \
            -v "$docker_home:/data" \
            -e OPENFANG_LISTEN=0.0.0.0:4310 \
            -e OPENFANG_API_KEY="$OPENFANG_API_KEY" \
          -e OPENFANG_STRICT_PRODUCTION="$OPENFANG_STRICT_PRODUCTION" \
            openfang-ci-smoke start

          for _ in $(seq 1 30); do
            if curl -fsS "$OPENFANG_BASE_URL/api/health" >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          curl -fsS "$OPENFANG_BASE_URL/api/health" >/dev/null
          for _ in $(seq 1 30); do
            health_status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' openfang-ci-smoke)"
            if [[ "$health_status" == "healthy" ]]; then
              break
            fi
            sleep 2
          done
          test "$health_status" = "healthy"
          bash scripts/smoke-openfang.sh "$OPENFANG_BASE_URL"
          OPENFANG_API_KEY="$OPENFANG_API_KEY" \
            OPENFANG_SMOKE_RESTART_CMD="$OPENFANG_SMOKE_RESTART_CMD" \
            OPENFANG_SMOKE_RESTART_TIMEOUT_SECS="$OPENFANG_SMOKE_RESTART_TIMEOUT_SECS" \
            bash scripts/live-api-smoke-openfang.sh "$OPENFANG_BASE_URL"
      - name: Upload Docker smoke log on failure
        if: failure()
        run: docker logs openfang-ci-smoke || true
      - name: Validate docker compose
        run: OPENFANG_API_KEY=ci-compose-validate docker compose config >/dev/null

  deploy-lint:
    name: Deploy Artifact Validation
    runs-on: ubuntu-latest
    needs: docker-smoke
    steps:
      - uses: actions/checkout@v6
      - name: Validate systemd unit
        run: |
          systemd-analyze verify deploy/openfang.service
          systemd-analyze verify deploy/openfang-backup.service
          systemd-analyze verify deploy/openfang-backup.timer
      - name: Validate docker-compose configuration
        run: OPENFANG_API_KEY=ci-deploy-lint docker compose -f docker-compose.yml config >/dev/null
      - name: Install promtool
        run: |
          sudo apt-get update
          sudo apt-get install -y prometheus
      - name: Validate Prometheus artifacts
        run: |
          promtool check rules deploy/openfang-alerts.yml
          promtool check config deploy/prometheus-scrape.yml

  ops-scripts:
    name: Ops Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ops-scripts
      - name: Syntax check operational scripts
        run: |
          bash -n scripts/backup-openfang.sh
          bash -n scripts/live-api-smoke-openfang.sh
          bash -n scripts/preflight-openfang.sh
          bash -n scripts/provider-canary-openfang.sh
          bash -n scripts/restore-openfang.sh
          bash -n scripts/smoke-openfang.sh
          python3 -m py_compile scripts/healthcheck-openfang.py
      - name: Healthcheck strict mode fails closed without authenticated readiness
        run: |
          tmpdir="$RUNNER_TEMP/healthcheck-strict"
          rm -rf "$tmpdir"
          mkdir -p "$tmpdir"
          cat > "$tmpdir/mock_health.py" <<'PY'
          from http.server import BaseHTTPRequestHandler, HTTPServer
          import json
          import os

          mode = os.environ["MOCK_MODE"]

          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == "/api/health/detail":
                      if mode == "auth-required":
                          self.send_response(401)
                          self.end_headers()
                          return
                      body = json.dumps({"status": "ok"}).encode()
                  elif self.path == "/api/health":
                      body = json.dumps({"status": "ok"}).encode()
                  else:
                      self.send_response(404)
                      self.end_headers()
                      return
                  self.send_response(200)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)

              def log_message(self, format, *args):
                  return

          HTTPServer(("127.0.0.1", 43291), Handler).serve_forever()
          PY
          MOCK_MODE=auth-required python3 "$tmpdir/mock_health.py" &
          server_pid=$!
          trap 'kill "$server_pid" >/dev/null 2>&1 || true; wait "$server_pid" >/dev/null 2>&1 || true' EXIT
          sleep 1
          OPENFANG_BASE_URL=http://127.0.0.1:43291 python3 scripts/healthcheck-openfang.py
          if OPENFANG_STRICT_PRODUCTION=1 OPENFANG_BASE_URL=http://127.0.0.1:43291 python3 scripts/healthcheck-openfang.py >"$tmpdir/strict.out" 2>"$tmpdir/strict.err"; then
            echo "strict healthcheck unexpectedly passed without authenticated readiness"
            exit 1
          fi
          grep -q 'OPENFANG_STRICT_PRODUCTION requires an authenticated /api/health/detail probe' "$tmpdir/strict.err"
      - name: Preflight strict mode rejects loose sensitive file permissions
        run: |
          export OPENFANG_HOME="$RUNNER_TEMP/preflight-strict-home"
          rm -rf "$OPENFANG_HOME"
          mkdir -p "$OPENFANG_HOME/config.d" "$OPENFANG_HOME/data"
          cat > "$OPENFANG_HOME/config.toml" <<'EOF'
          include = ["config.d/providers.toml"]
          api_listen = "127.0.0.1:4200"
          EOF
          cat > "$OPENFANG_HOME/config.d/providers.toml" <<'EOF'
          log_level = "info"
          EOF
          chmod 600 "$OPENFANG_HOME/config.toml"
          chmod 644 "$OPENFANG_HOME/config.d/providers.toml"
          if OPENFANG_API_KEY=test-machine-key OPENFANG_STRICT_PRODUCTION=1 bash scripts/preflight-openfang.sh --offline >"$RUNNER_TEMP/preflight-strict.out" 2>"$RUNNER_TEMP/preflight-strict.err"; then
            echo "strict preflight unexpectedly passed with loose include permissions"
            exit 1
          fi
          grep -q 'strict production mode rejects loose sensitive file permissions' "$RUNNER_TEMP/preflight-strict.err"
          chmod 600 "$OPENFANG_HOME/config.d/providers.toml"
          OPENFANG_API_KEY=test-machine-key OPENFANG_STRICT_PRODUCTION=1 bash scripts/preflight-openfang.sh --offline >"$RUNNER_TEMP/preflight-strict-pass.log"
          grep -q 'ok  sqlite_path=' "$RUNNER_TEMP/preflight-strict-pass.log"
      - name: Preflight strict mode accepts systemd-style external env permissions
        run: |
          export OPENFANG_HOME="$RUNNER_TEMP/preflight-systemd-home"
          export OPENFANG_ENV_FILE="$RUNNER_TEMP/preflight-systemd.env"
          rm -rf "$OPENFANG_HOME" "$OPENFANG_ENV_FILE"
          mkdir -p "$OPENFANG_HOME/data"
          cat > "$OPENFANG_HOME/config.toml" <<'EOF'
          api_listen = "127.0.0.1:4200"
          EOF
          cat > "$OPENFANG_ENV_FILE" <<EOF
          OPENFANG_HOME=$OPENFANG_HOME
          OPENFANG_API_KEY=test-machine-key
          EOF
          chmod 600 "$OPENFANG_HOME/config.toml"
          chmod 640 "$OPENFANG_ENV_FILE"
          OPENFANG_STRICT_PRODUCTION=1 bash scripts/preflight-openfang.sh --offline >"$RUNNER_TEMP/preflight-systemd-pass.log"
          grep -q 'ok  sqlite_path=' "$RUNNER_TEMP/preflight-systemd-pass.log"
      - name: Restore guardrails reject malformed backups
        run: |
          export OPENFANG_HOME="$RUNNER_TEMP/restore-guard-home"
          export OPENFANG_SKIP_SAFETY_BACKUP=1
          mkdir -p "$OPENFANG_HOME" "$RUNNER_TEMP/invalid-backup"
          printf 'sentinel = true\n' > "$OPENFANG_HOME/config.toml"
          if bash scripts/restore-openfang.sh "$RUNNER_TEMP/invalid-backup" --yes; then
            echo "restore-openfang.sh unexpectedly accepted an empty backup"
            exit 1
          fi
          grep -q 'sentinel = true' "$OPENFANG_HOME/config.toml"
      - name: Backup ignores unrelated reachable API endpoint
        run: |
          export OPENFANG_HOME="$RUNNER_TEMP/openfang-home-unrelated-daemon"
          mkdir -p "$OPENFANG_HOME"
          cat > "$OPENFANG_HOME/config.toml" <<'EOF'
          api_listen = "127.0.0.1:43211"
          EOF
          python3 - <<'PY' &
          import json
          from http.server import BaseHTTPRequestHandler, HTTPServer

          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == "/api/health":
                      body = json.dumps({"status": "ok"}).encode()
                  elif self.path == "/api/status":
                      body = json.dumps({"status": "running", "home_dir": "/tmp/other-openfang-home"}).encode()
                  else:
                      self.send_response(404)
                      self.end_headers()
                      return
                  self.send_response(200)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)

              def log_message(self, format, *args):
                  return

          HTTPServer(("127.0.0.1", 43211), Handler).serve_forever()
          PY
          server_pid=$!
          trap 'kill "$server_pid" >/dev/null 2>&1 || true' EXIT
          sleep 1
          bash scripts/backup-openfang.sh "$RUNNER_TEMP/backups-unrelated-daemon"
          find "$RUNNER_TEMP/backups-unrelated-daemon" -maxdepth 1 -type d -name 'openfang-*' | grep -q .
      - name: Backup rejects custom sqlite metadata without python3
        run: |
          export OPENFANG_HOME="$RUNNER_TEMP/openfang-home-no-python"
          mkdir -p "$OPENFANG_HOME/runtime-data/state"
          cat > "$OPENFANG_HOME/config.toml" <<'EOF'
          api_listen = "127.0.0.1:4200"
          data_dir = "runtime-data"

          [memory]
          sqlite_path = "runtime-data/state/runtime.db"
          EOF
          python3 - <<'PY'
          import os
          import sqlite3

          db_path = os.path.join(
              os.environ["OPENFANG_HOME"],
              "runtime-data",
              "state",
              "runtime.db",
          )
          conn = sqlite3.connect(db_path)
          conn.execute("CREATE TABLE demo (id INTEGER PRIMARY KEY, value TEXT)")
          conn.execute("INSERT INTO demo (value) VALUES ('ok')")
          conn.commit()
          conn.close()
          PY
          tool_bin="$RUNNER_TEMP/no-python-bin"
          rm -rf "$tool_bin"
          mkdir -p "$tool_bin"
          for cmd in awk basename bash cat chmod cp cut date dirname find grep head hostname mkdir pwd rm sort sqlite3 tail tr; do
            ln -s "$(command -v "$cmd")" "$tool_bin/$cmd"
          done
          backup_log="$RUNNER_TEMP/backup-no-python.log"
          if env PATH="$tool_bin" bash scripts/backup-openfang.sh "$RUNNER_TEMP/backups-no-python" >"$backup_log" 2>&1; then
            echo "backup-openfang.sh unexpectedly succeeded without python3"
            cat "$backup_log"
            exit 1
          fi
          grep -q 'python3 is required to resolve runtime sqlite_path' "$backup_log"
      - name: Backup metadata hashing falls back when sha256sum is unavailable
        run: |
          export OPENFANG_HOME="$RUNNER_TEMP/openfang-home-hash-fallback"
          rm -rf "$OPENFANG_HOME"
          mkdir -p "$OPENFANG_HOME/data"
          cat > "$OPENFANG_HOME/config.toml" <<'EOF'
          api_listen = "127.0.0.1:4200"
          EOF
          sqlite3 "$OPENFANG_HOME/data/openfang.db" 'CREATE TABLE demo (id INTEGER PRIMARY KEY, value TEXT);'
          tool_bin="$RUNNER_TEMP/hash-fallback-bin"
          rm -rf "$tool_bin"
          mkdir -p "$tool_bin"
          cat > "$tool_bin/openfang" <<'EOF'
          #!/usr/bin/env bash
          echo "openfang 0.0.0 (deadbeef)"
          EOF
          cat > "$tool_bin/sha256sum" <<'EOF'
          #!/usr/bin/env bash
          exit 127
          EOF
          chmod +x "$tool_bin/openfang" "$tool_bin/sha256sum"
          PATH="$tool_bin:$PATH" bash scripts/backup-openfang.sh "$RUNNER_TEMP/backups-hash-fallback"
          backup_dir="$(find "$RUNNER_TEMP/backups-hash-fallback" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          grep -Eq '^openfang_binary_sha256=[0-9a-f]{64}$' "$backup_dir/BACKUP.txt"
      - name: Backup metadata detects repo-local binary when PATH lacks openfang
        run: |
          export OPENFANG_HOME="$RUNNER_TEMP/openfang-home-local-binary"
          rm -rf "$OPENFANG_HOME" "$RUNNER_TEMP/backups-local-binary"
          mkdir -p "$OPENFANG_HOME/data" target/debug
          cat > "$OPENFANG_HOME/config.toml" <<'EOF'
          api_listen = "127.0.0.1:4200"
          EOF
          sqlite3 "$OPENFANG_HOME/data/openfang.db" 'CREATE TABLE demo (id INTEGER PRIMARY KEY, value TEXT);'
          trap 'rm -f target/debug/openfang' EXIT
          cat > target/debug/openfang <<'EOF'
          #!/usr/bin/env bash
          echo "openfang 0.0.0 (feedcafe)"
          EOF
          chmod +x target/debug/openfang
          PATH="/usr/bin:/bin" bash scripts/backup-openfang.sh "$RUNNER_TEMP/backups-local-binary"
          backup_dir="$(find "$RUNNER_TEMP/backups-local-binary" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          grep -q "^openfang_binary=$PWD/target/debug/openfang$" "$backup_dir/BACKUP.txt"
          grep -Eq '^openfang_binary_sha256=[0-9a-f]{64}$' "$backup_dir/BACKUP.txt"
      - name: Backup and restore roundtrip
        run: |
          export OPENFANG_HOME="$RUNNER_TEMP/openfang-home"
          export OPENFANG_SKIP_SAFETY_BACKUP=1
          export OPENFANG_ENV_FILE="$RUNNER_TEMP/openfang-system-env/env"
          mkdir -p "$OPENFANG_HOME/runtime-data/state" "$OPENFANG_HOME/agents" "$OPENFANG_HOME/config.d"
          mkdir -p "$(dirname "$OPENFANG_ENV_FILE")"
          cat > "$OPENFANG_HOME/config.toml" <<'EOF'
          include = ["config.d/providers.toml"]
          api_listen = "127.0.0.1:4200"
          data_dir = "runtime-data"

          [default_model]
          provider = "groq"
          model = "llama-3.3-70b-versatile"
          api_key_env = "GROQ_API_KEY"

          [memory]
          sqlite_path = "runtime-data/state/runtime.db"
          EOF
          printf 'log_level = "debug"\n' > "$OPENFANG_HOME/config.d/providers.toml"
          printf 'GROQ_API_KEY=test-key\n' > "$OPENFANG_HOME/.env"
          printf 'OPENFANG_API_KEY=backup-restore-secret\n' > "$OPENFANG_HOME/secrets.env"
          printf 'OPENFANG_API_KEY=external-secret\nEXTERNAL_ONLY=from-external\n' > "$OPENFANG_ENV_FILE"
          printf '[{"id":"custom-demo","provider":"groq"}]\n' > "$OPENFANG_HOME/custom_models.json"
          printf '[[installed]]\nid = "github"\nenabled = true\n' > "$OPENFANG_HOME/integrations.toml"
          printf 'demo = true\n' > "$OPENFANG_HOME/agents/example.toml"
          python3 - <<'PY'
          import os
          import sqlite3
          db_path = os.path.join(
              os.environ["OPENFANG_HOME"],
              "runtime-data",
              "state",
              "runtime.db",
          )
          conn = sqlite3.connect(db_path)
          conn.execute("CREATE TABLE demo (id INTEGER PRIMARY KEY, value TEXT)")
          conn.execute("INSERT INTO demo (value) VALUES ('ok')")
          conn.commit()
          conn.close()
          PY
          bash scripts/backup-openfang.sh "$RUNNER_TEMP/backups"
          backup_dir="$(find "$RUNNER_TEMP/backups" -maxdepth 1 -type d -name 'openfang-*' | head -n 1)"
          mkdir -p "$OPENFANG_HOME/stale"
          printf 'include = ["stale/legacy.toml"]\napi_listen = "127.0.0.1:4300"\n' > "$OPENFANG_HOME/config.toml"
          printf 'log_level = "trace"\n' > "$OPENFANG_HOME/stale/legacy.toml"
          printf 'OPENFANG_API_KEY=drifted\n' > "$OPENFANG_ENV_FILE"
          bash scripts/restore-openfang.sh "$backup_dir" --yes
          test -f "$OPENFANG_HOME/config.toml"
          test -f "$OPENFANG_HOME/config.d/providers.toml"
          test ! -e "$OPENFANG_HOME/stale/legacy.toml"
          test -f "$OPENFANG_HOME/secrets.env"
          test -f "$OPENFANG_HOME/runtime-data/state/runtime.db"
          test ! -e "$OPENFANG_HOME/data/openfang.db"
          test -f "$OPENFANG_HOME/custom_models.json"
          test -f "$OPENFANG_HOME/integrations.toml"
          grep -q 'include = \["config.d/providers.toml"\]' "$OPENFANG_HOME/config.toml"
          grep -q 'data_dir = "runtime-data"' "$OPENFANG_HOME/config.toml"
          grep -q 'sqlite_path = "runtime-data/state/runtime.db"' "$OPENFANG_HOME/config.toml"
          grep -q 'log_level = "debug"' "$OPENFANG_HOME/config.d/providers.toml"
          grep -q 'OPENFANG_API_KEY=backup-restore-secret' "$OPENFANG_HOME/secrets.env"
          grep -q 'GROQ_API_KEY=test-key' "$OPENFANG_HOME/.env"
          grep -q '"custom-demo"' "$OPENFANG_HOME/custom_models.json"
          grep -q 'id = "github"' "$OPENFANG_HOME/integrations.toml"
          grep -q 'demo = true' "$OPENFANG_HOME/agents/example.toml"
          grep -q 'OPENFANG_API_KEY=external-secret' "$OPENFANG_ENV_FILE"
          grep -q 'EXTERNAL_ONLY=from-external' "$OPENFANG_ENV_FILE"
          python3 - <<'PY'
          import os
          import stat
          import sqlite3
          db_path = os.path.join(
              os.environ["OPENFANG_HOME"],
              "runtime-data",
              "state",
              "runtime.db",
          )
          conn = sqlite3.connect(db_path)
          row = conn.execute("SELECT value FROM demo ORDER BY id").fetchone()
          conn.close()
          assert row == ("ok",), row
          for rel in ("config.toml", ".env", "secrets.env"):
            path = os.path.join(os.environ["OPENFANG_HOME"], rel)
            mode = stat.S_IMODE(os.stat(path).st_mode)
            assert mode & 0o077 == 0, (rel, oct(mode))
          external_env = os.environ["OPENFANG_ENV_FILE"]
          external_mode = stat.S_IMODE(os.stat(external_env).st_mode)
          assert external_mode & 0o077 == 0, oct(external_mode)
          include_path = os.path.join(os.environ["OPENFANG_HOME"], "config.d", "providers.toml")
          include_mode = stat.S_IMODE(os.stat(include_path).st_mode)
          assert include_mode & 0o077 == 0, oct(include_mode)
          PY
          bash scripts/preflight-openfang.sh --offline
      - name: Restored runtime boots and reports ready
        env:
          OPENFANG_HOME: ${{ runner.temp }}/openfang-home
          OPENFANG_LISTEN: 127.0.0.1:43220
          OPENFANG_API_KEY: backup-restore-secret
          OPENFANG_BASE_URL: http://127.0.0.1:43220
        run: |
          cargo build -p openfang-cli --locked
          trap 'if [[ -n "${daemon_pid:-}" ]]; then kill "${daemon_pid}" >/dev/null 2>&1 || true; wait "${daemon_pid}" || true; fi' EXIT
          target/debug/openfang start >"$RUNNER_TEMP/restored-openfang.log" 2>&1 &
          daemon_pid=$!

          for _ in $(seq 1 30); do
            if curl -fsS \
              -H "Authorization: Bearer ${OPENFANG_API_KEY}" \
              "${OPENFANG_BASE_URL}/api/health/detail" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          detail_json="$(curl -fsS \
            -H "Authorization: Bearer ${OPENFANG_API_KEY}" \
            "${OPENFANG_BASE_URL}/api/health/detail")"
          status_json="$(curl -fsS \
            -H "Authorization: Bearer ${OPENFANG_API_KEY}" \
            "${OPENFANG_BASE_URL}/api/status")"
          metrics_body="$(curl -fsS \
            -H "Authorization: Bearer ${OPENFANG_API_KEY}" \
            "${OPENFANG_BASE_URL}/api/metrics")"

          DETAIL_JSON="$detail_json" STATUS_JSON="$status_json" python3 - <<'PY'
          import json
          import os

          detail = json.loads(os.environ["DETAIL_JSON"])
          status = json.loads(os.environ["STATUS_JSON"])
          assert detail["status"] == "ok", detail
          assert detail["readiness"]["ready"] is True, detail
          assert status["status"] == "running", status
          assert os.path.realpath(status["home_dir"]) == os.path.realpath(os.environ["OPENFANG_HOME"]), status
          PY
          printf '%s' "$metrics_body" | grep -q 'openfang_readiness_ready 1'
          OPENFANG_API_KEY="${OPENFANG_API_KEY}" bash scripts/live-api-smoke-openfang.sh "${OPENFANG_BASE_URL}"

          curl -fsS -X POST \
            -H "Authorization: Bearer ${OPENFANG_API_KEY}" \
            "${OPENFANG_BASE_URL}/api/shutdown" >/dev/null
          wait "${daemon_pid}"
          daemon_pid=""
      - name: Backup and restore roundtrip with custom sqlite_path
        run: |
          export OPENFANG_HOME="$RUNNER_TEMP/openfang-home-custom-sqlite"
          export OPENFANG_SKIP_SAFETY_BACKUP=1
          export OPENFANG_ENV_FILE="$RUNNER_TEMP/openfang-system-env-custom-sqlite/env"
          mkdir -p "$OPENFANG_HOME/state" "$OPENFANG_HOME/config.d" "$(dirname "$OPENFANG_ENV_FILE")"
          cat > "$OPENFANG_HOME/config.toml" <<'EOF'
          include = ["config.d/runtime.toml"]
          api_listen = "127.0.0.1:4200"

          [memory]
          sqlite_path = "state/custom.db"
          EOF
          printf 'log_level = "debug"\n' > "$OPENFANG_HOME/config.d/runtime.toml"
          printf 'OPENFANG_API_KEY=custom-sqlite-secret\n' > "$OPENFANG_HOME/secrets.env"
          printf 'EXTERNAL_ONLY=from-external\n' > "$OPENFANG_ENV_FILE"
          python3 - <<'PY'
          import os
          import sqlite3
          home = os.environ["OPENFANG_HOME"]
          db_path = os.path.join(home, "state", "custom.db")
          conn = sqlite3.connect(db_path)
          conn.execute("CREATE TABLE demo (id INTEGER PRIMARY KEY, value TEXT)")
          conn.execute("INSERT INTO demo (value) VALUES ('custom')")
          conn.commit()
          conn.close()
          PY
          bash scripts/backup-openfang.sh "$RUNNER_TEMP/backups-custom-sqlite"
          backup_dir="$(find "$RUNNER_TEMP/backups-custom-sqlite" -maxdepth 1 -type d -name 'openfang-*' | head -n 1)"
          rm -rf "$OPENFANG_HOME/state"
          mkdir -p "$OPENFANG_HOME/state"
          printf 'stale\n' > "$OPENFANG_HOME/state/marker.txt"
          bash scripts/restore-openfang.sh "$backup_dir" --yes
          bash scripts/preflight-openfang.sh --offline | tee "$RUNNER_TEMP/preflight-custom-sqlite.log"
          python3 - <<'PY'
          import os
          import sqlite3
          home = os.environ["OPENFANG_HOME"]
          db_path = os.path.join(home, "state", "custom.db")
          assert os.path.exists(db_path), db_path
          conn = sqlite3.connect(db_path)
          row = conn.execute("SELECT value FROM demo").fetchone()
          conn.close()
          assert row == ("custom",), row
          config_text = open(os.path.join(home, "config.toml"), encoding="utf-8").read()
          assert 'sqlite_path = "state/custom.db"' in config_text
          PY
          grep -q 'sqlite_path=.*/state/custom.db' "$RUNNER_TEMP/preflight-custom-sqlite.log"
