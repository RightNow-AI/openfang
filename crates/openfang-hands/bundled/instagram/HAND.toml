id = "instagram"
name = "Instagram Hand"
description = "Autonomous Instagram manager — content creation, scheduled posting, stories, reels, and engagement"
category = "communication"
icon = "📸"
tools = ["shell_exec", "file_read", "file_write", "file_list", "web_fetch", "web_search", "memory_store", "memory_recall", "schedule_create", "schedule_list", "schedule_delete", "knowledge_add_entity", "knowledge_add_relation", "knowledge_query", "event_publish"]

[[requires]]
key = "FACEBOOK_ACCESS_TOKEN"
label = "Facebook/Instagram API Access Token"
requirement_type = "api_key"
check_value = "FACEBOOK_ACCESS_TOKEN"
description = "A long-lived Facebook/Instagram Graph API access token. Required for posting to Instagram via the Facebook Graph API."

[requires.install]
signup_url = "https://developers.facebook.com/"
docs_url = "https://developers.facebook.com/docs/instagram-api"
env_example = "FACEBOOK_ACCESS_TOKEN=EAAxxxxxxxxxxxx..."
estimated_time = "15-30 min"
steps = [
    "Create a Facebook Developer account",
    "Create a Facebook App (Business type)",
    "Add the 'Instagram Graph API' product",
    "Connect your Instagram Business/Creator account to a Facebook Page",
    "Get a long-lived access token via the Graph API Explorer",
    "Set the token as an environment variable",
    "Restart OpenFang or reload config for the change to take effect",
]

