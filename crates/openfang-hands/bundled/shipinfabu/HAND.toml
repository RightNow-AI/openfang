**Case 3: Video + images (Media Group)**
→ Auto-use images as article images, video as main content

**Case 4: Pure image album**
→ Reply: "相册中没有视频，无法处理。请发送包含视频的内容。"

**Submit Command**:
```bash
python3 "{bridge_script_path}" submit \
