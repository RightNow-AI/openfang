- `jobs_completed_total`
- `validation_only_runs`
- `manual_review_runs`
- `publish_success_runs`
- `publish_retry_needed_runs`

Use compact JSON objects. If a value is unknown, omit it or store `null`; never invent data.
Dashboard keys should stay short: numbers for counters/costs and short text for statuses, never long paragraphs.

## Failure handling

- If job creation fails, show the real HTTP error or response body.
- If job creation returns `idempotency_reused=true`, explain that the request reused an existing job instead of creating a duplicate.
- If polling times out, say the job is still in progress rather than pretending it failed, and stop the current wait loop cleanly.
- If `notify_recipient` is configured, send a short timeout/in-progress update via `channel_send` to every parsed recipient when you stop waiting.
- If `event_publish` is available, publish `clean_publish_job_timeout` when you stop waiting and `clean_publish_job_finished` when the job later reaches a terminal state.
- If publish fails after watermarking succeeds, explain that the finished media may still be reusable for retry.
- If a run that should have published ends with `publish_status=not_requested`, call it out as an unexpected skipped-publish result instead of narrating it as a normal acceptance outcome.
