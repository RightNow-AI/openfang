```

**Important**:
- Files keep original filenames, bridge collect will auto-rename to `01_source.mp4`, `02_image.jpg`, etc.
- Batch directory created by shipinfabu, bridge uses it directly
- Avoid duplicate file copying, improve performance

**Error Handling and Recovery**:
1. **Download Failures**:
   - Retry 3 times with 5-second delay (curl --retry 3 --retry-delay 5)
   - If all retries fail, notify user with specific error
   - Continue processing other files in Media Group (partial success)
   - Log failed URLs and reasons to workspace logs
   - Example error messages:
     - "❌ 下载失败：video.mp4 (连接超时)"
     - "⚠️ 部分完成：成功 2 个，失败 1 个"

2. **File Verification**:
   - Check file size > 1KB after download (avoid empty/corrupted files)
   - Delete files that fail verification
   - Track successful vs failed downloads separately
   - Only proceed to Phase 3 if at least one file succeeded

3. **Media Group Collection Timeout**:
   - Wait 3 seconds by default
   - If network is slow, extend to 5 seconds
   - If collection incomplete, notify user and ask to resend

4. **Bridge Collect Failures**:
   - If bridge returns error, parse and explain to user
   - Common errors:
     - Path not in allowlist → suggest using staging dir
     - File not found → check if download completed
     - Invalid format → check file extension

5. **Memory Store Cleanup**:
   - After processing media group, clean up memory keys
   - Pattern: `media_group_{chat_id}_{media_group_id}_*`
   - Prevent memory leak in long-running sessions

6. **Disk Space Monitoring**:
   - Before download, check available disk space
   - If < 1GB, warn user and skip download
   - Rely on automatic cleanup (12-hour retention)

7. **Graceful Degradation**:
   - If Media Group aggregation fails, fall back to single-media mode
   - If download fails completely, provide manual upload instructions
   - If bridge fails, suggest direct file path submission
   - Continue with partial results when possible

### Phase 3: Batch Collection (Optimized)

**Key Improvement**: Use `--media-dir` to let bridge scan the downloaded batch directory directly, avoiding duplicate file copying.

**Single Media**:
```bash
python3 "{bridge_script_path}" collect \
  --chat-id "{chat_id}" \
  --message-id "{message_id}" \
  --media-group-id "" \
  --media-dir "{intake_dir}" \
  --caption "{user_caption}" \
  --local-media-intake-dir "{local_media_intake_dir}" \
  --local-media-intake-retention-hours "{retention_hours}"
```

**Media Group (Album)**:
```bash
python3 "{bridge_script_path}" collect \
  --chat-id "{chat_id}" \
  --message-id "{first_message_id}" \
  --media-group-id "{media_group_id}" \
  --media-dir "{intake_dir}" \
  --caption "{user_caption}" \
  --local-media-intake-dir "{local_media_intake_dir}" \
  --local-media-intake-retention-hours "{retention_hours}"
```

**Important Notes**:
- `--media-dir` lets bridge scan all images and videos in the directory
- Bridge auto-sorts by filename and renames to `01_source.mp4`, `02_image.jpg`, etc.
- Since files are already in the correct batch directory, bridge won't copy again
- Pass `--media-group-id` to let bridge generate correct batch_id

### Phase 4: Confirmation and Submission

**Case 1: Single video + auto_process_single_video=true**
→ Submit directly, no confirmation needed

**Case 2: Multiple videos (from Media Group or multiple sends)**
→ Send confirmation message:
