[[settings.options]]
value = "casual"
label = "Casual"

[[settings.options]]
value = "friendly"
label = "Friendly"

[[settings.options]]
value = "informative"
label = "Informative"

[[settings.options]]
value = "entertaining"
label = "Entertaining"

[[settings]]
