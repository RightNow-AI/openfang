label = "Post Frequency"
description = "How often to create and post content"
setting_type = "select"
default = "1_daily"

[[settings.options]]
value = "1_daily"
label = "1 per day"

[[settings.options]]
value = "3_weekly"
label = "3 per week"

[[settings.options]]
value = "5_weekly"
label = "5 per week"

[[settings.options]]
value = "1_weekly"
label = "1 per week"

[[settings]]
